<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="page">

<header>
    <h1>Todo App</h1>

    <nav class="nav">
        <ul class="nav-list">
            <li><a href="index.html">Головна</a></li>
            <li><a href="about.html">Про мене</a></li>
            <li><a href="contacts.html">Контакти</a></li>
            <li><a href="todo.html">Todo App</a></li>
        </ul>
    </nav>
</header>

<main class="todo-container">

    <section class="todo-section">

        <h2>Менеджер завдань</h2>

        <form class="todo-form">
            <input type="text" class="todo-input" placeholder="Нове завдання...">
            <button class="add-btn" disabled>Додати</button>
        </form>

        <input type="text" class="search-input" placeholder="Пошук...">

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Всі</button>
            <button class="filter-btn" data-filter="active">Активні</button>
            <button class="filter-btn" data-filter="completed">Виконані</button>
        </div>

        <p>Активних: <span class="counter">0</span></p>

        <div class="loader hidden">Завантаження...</div>

        <ul class="task-list"></ul>

    </section>

</main>

</div>

<script src="todo.js"></script>

</body>
</html>
