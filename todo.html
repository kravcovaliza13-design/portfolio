<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Todo App">
    <title>Todo App</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="page">

<header>
    <h1>Todo App</h1>

    <nav class="nav">
        <input type="checkbox" id="menu-toggle" class="menu-toggle">

        <label for="menu-toggle" class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <ul class="nav-list">
            <li><a href="index.html">Головна</a></li>
            <li><a href="about.html">Про мене</a></li>
            <li><a href="contacts.html">Контакти</a></li>
            <li><a href="todo.html">Todo App</a></li>
        </ul>
    </nav>
</header>

<main class="todo-container">

    <section class="todo-section">

        <h2>Менеджер завдань</h2>

        <form class="todo-form">
            <input
                type="text"
                class="todo-input"
                placeholder="Введіть нове завдання..."
            >

            <button type="submit" class="add-btn" disabled>
                Додати
            </button>
        </form>

        <div class="search-box">
            <input
                type="text"
                class="search-input"
                placeholder="Пошук завдань..."
            >
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">
                Всі
            </button>

            <button class="filter-btn" data-filter="active">
                Активні
            </button>

            <button class="filter-btn" data-filter="completed">
                Виконані
            </button>
        </div>

        <p class="tasks-counter">
            Активних завдань: <span class="counter">0</span>
        </p>

        <div class="loader hidden">
            Завантаження...
        </div>

        <ul class="task-list"></ul>

    </section>

</main>

<footer>
    <p>&copy; 2026 Єлізавета Кравцова</p>
</footer>

</div>

<script src="todo.js"></script>
<script src="script.js"></script>

</body>
</html>
