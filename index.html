<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="todo-app">

  <h1>Todo App</h1>

  <input class="task-input" placeholder="Нове завдання">
  <button class="add-btn" disabled>Додати</button>

  <input class="search-input" placeholder="Пошук...">

  <div class="filters">
    <button data-filter="all">Всі</button>
    <button data-filter="active">Активні</button>
    <button data-filter="done">Виконані</button>
  </div>

  <ul class="task-list"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
